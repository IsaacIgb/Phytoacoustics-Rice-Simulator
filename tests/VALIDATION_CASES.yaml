    crop_type: rice
    sound_type: pure_tone
    frequency_hz: 350
    spl_db_at_1m: 60.0
    hours_per_day: 4.0
    total_days: 15.0
    water_regime: well_watered
    stage_bucket: seedling
  expected:
    primary_outcome_name: photosynthesis_rate
    primary_direction: increase
    expected_effect_pct_band:
    - 38
    - 52
    expected_confidence: high
