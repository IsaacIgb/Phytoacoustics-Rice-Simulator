version: 3
dataset_sources:
- rice_sound_master_v2.csv
notes:
- Use these cases as benchmark checks for model behavior on the improved CSV.
- Prioritise matching verified literature effect sizes within reasonable bands over
  loose directional checks.
- Do not invent stronger certainty than the source data supports.
- Rice cases are the primary validation authority for the rice simulator.
- Non-rice cereal and grass cases are transfer and boundary checks, not primary calibration
  anchors.
- Ultrasound seed-treatment cases must not be merged blindly with airborne field-sound
  cases.
cases:
- case_id: baseline_no_sound_001
  case_type: baseline_sanity
  domain_role: core_sanity
  description: No sound treatment should produce no sound-related effect.
  inputs:
    crop_type: rice
    sound_type: none
    frequency_hz: null
    spl_db_at_1m: null
    hours_per_day: 0
    total_days: 0
    water_regime: well_watered
    stage_bucket: seedling
  expected:
    primary_direction: no_clear_change
    expected_effect_pct_band:
    - -1
    - 1
    expected_confidence: high
